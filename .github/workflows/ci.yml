name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: fastapi

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python runtime
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install project dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Run unit tests
      - name: Run tests
        run: |
          pytest

      # Authenticate to Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate short commit SHA tag
      - name: Set tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Build Docker image
      - name: Build image
        run: |
          docker build -t dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }} .
          docker tag dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }} dani54196/fastapi-hello:latest

      # Run Trivy filesystem scan (source code)
      - name: Run Trivy (fs scan)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Run Trivy image scan (Docker image)
      - name: Run Trivy (image scan)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # Push image only if all previous steps succeed
      - name: Push image
        run: |
          docker push dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }}
          docker push dani54196/fastapi-hello:latest