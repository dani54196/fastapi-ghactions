name: CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: fastapi

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Python runtime
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Run tests
      - name: Run tests
        run: pytest

      # Login to Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set tag from commit SHA
      - name: Set tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Setup buildx (multi-arch)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push image (multi-arch)
      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }} \
            -t dani54196/fastapi-hello:latest \
            --push .

      # Trivy filesystem scan
      - name: Run Trivy (fs scan)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Trivy image scan
      - name: Run Trivy (image scan)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: dani54196/fastapi-hello:${{ steps.tag.outputs.TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1